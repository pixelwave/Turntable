            radius: 10
            text_color: 0xFFFFFF
            checkable: true
            widgets:
              - label:
                  align: CENTER
                  text: "PLAY"
                  text_color: 0xFFFFFF

        - bar:
            id: lv_bar_steps
            x: 56
            y: 168
            width: 208
            height: 18
