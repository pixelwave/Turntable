lvgl:
  pages:
    - id: canvas_4
      bg_color: 0x000000
      pad_all: 0
      widgets:
        - label:
            id: lv_label_steps
            x: 55
            y: 69
            width: 209
            height: 98
            text: "1000"
            text_color: 0xFFFFFF
            text_align: RIGHT
            text_font: montserrat_80

        - label:
            id: lv_label_steps_fixed
            x: 159
            y: 201
            width: 105
            height: 35
