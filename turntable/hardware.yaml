i2c:
  # I/O EXPANDER (MCP23017)
  - id: mcp_i2c
    sda: ${MCP_SDA}
    scl: ${MCP_SCL}
    #frequency: 400kHz   # fast with MCP23017
    frequency: 100kHz   # longer cable runs

mcp23017:
  # I/O EXPANDER (MCP23017)
  - id: mcp23017_hub
    address: 0x27
    i2c_id: mcp_i2c

binary_sensor:
  # BTN (SW) → Kailh Choc
  - platform: gpio
    pin:
      mcp23xxx: mcp23017_hub
      number: ${BTN_CHOC_NO}
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Button (Choc)"
    id: btn_02
    filters:
      - delayed_on_off: 50ms
    on_press:
      then:
        - lambda: |-
            id(motor_direction) = (id(motor_direction) == 1) ? -1 : 1;
        - lvgl.widget.update:
            id: lv_button_dir
            state:
              checked: !lambda 'return id(motor_direction) == 1;'
        - if:
            condition:
              lambda: 'return id(motor_running);'
            then:
              - stepper.set_target:
                  id: my_stepper
                  target: !lambda |-
                    int dir = id(motor_direction);
                    return id(my_stepper).current_position + (dir * 10000000);

