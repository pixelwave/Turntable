sensor:
  # ROTARY ENCODER → controls speed (max 1500, fine steps around 50)
  - platform: rotary_encoder
    name: "Bench Rotary Encoder"
    id: bench_encoder
    pin_a: ${RE_DT}
    pin_b: ${RE_CLK}
    min_value: -100000
    max_value: 100000
    # actions when turning clockwise
    on_clockwise:
      then:
        - lambda: |-
            int new_speed = id(current_speed);
            if (new_speed <= 50) {
              new_speed += 10;
              if (new_speed > 50) new_speed = 100;   // from 50 jump directly to 100
            } else {
              new_speed += 100;
            }
            if (new_speed > 1500) new_speed = 1500;
            id(current_speed) = new_speed;
            ESP_LOGI("encoder", "🔄 CW → Speed now %d steps/s", new_speed);
        - stepper.set_speed:
            id: my_stepper
            speed: !lambda 'return id(current_speed);'
        - if:
            condition:
              lambda: 'return id(motor_running);'
            then:
              - stepper.set_target:
                  id: my_stepper
                  target: !lambda |-
                    int dir = id(motor_direction);
                    return id(my_stepper).current_position + (dir * 10000000);
        - lvgl.label.update:
            id: lv_label_steps
            text: !lambda |-
              return str_sprintf("%d", id(current_speed));
        - lvgl.bar.update:
            id: lv_bar_steps
            value: !lambda 'return int(id(current_speed) / 15.0);'
    # actions when turning counterclockwise
    on_anticlockwise:
      then:
        - lambda: |-
            int new_speed = id(current_speed);
            if (new_speed > 50) {
              new_speed -= 100;
              if (new_speed < 50) new_speed = 50;
            } else {
              new_speed -= 10;
            }
            if (new_speed < 10) new_speed = 10;
            id(current_speed) = new_speed;
            ESP_LOGI("encoder", "🔄 CCW → Speed now %d steps/s", new_speed);
        - stepper.set_speed:
            id: my_stepper
            speed: !lambda 'return id(current_speed);'
        - if:
            condition:
              lambda: 'return id(motor_running);'
            then:
              - stepper.set_target:
                  id: my_stepper
                  target: !lambda |-
                    int dir = id(motor_direction);
                    return id(my_stepper).current_position + (dir * 10000000);
        - lvgl.label.update:
            id: lv_label_steps
            text: !lambda |-
              return str_sprintf("%d", id(current_speed));
        - lvgl.bar.update:
            id: lv_bar_steps
            value: !lambda 'return int(id(current_speed) / 15.0);'